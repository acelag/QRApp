<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="#8b5cf6"/>

  <!-- Fork: 3 tines + curved neck + handle -->
  <g fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="27" y1="14" x2="27" y2="36"/>
    <line x1="35" y1="14" x2="35" y2="36"/>
    <line x1="43" y1="14" x2="43" y2="36"/>
    <path d="M27 36 C27 47 43 47 43 36"/>
    <line x1="35" y1="47" x2="35" y2="86"/>
  </g>

  <!-- Knife: straight back + curved blade + handle -->
  <g fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M57 14 C70 14 70 42 57 46"/>
    <line x1="57" y1="14" x2="57" y2="86"/>
  </g>
</svg>
