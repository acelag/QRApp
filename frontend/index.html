<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Order Live</title>

    <!-- Elegant serif for the customer welcome screen -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap" />

    <!-- PWA -->
    <meta name="application-name" content="Order Live" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Order Live" />

    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <script>
    (function(){
      if(window.location.pathname==='/login')return;
      var hex=localStorage.getItem('qra-theme');
      if(!hex||!/^#[0-9a-fA-F]{6}$/.test(hex))return;
      function mix(h,w){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);function v(c){return Math.round(c+(255-c)*w).toString(16).padStart(2,'0');}return'#'+v(r)+v(g)+v(b);}
      function drk(h,a){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);function v(c){return Math.round(c*(1-a)).toString(16).padStart(2,'0');}return'#'+v(r)+v(g)+v(b);}
      var P={'#f97316':{l:'#fff7ed',d:'#ea6c00',b:'#fed7aa',r:'#fdba74'},'#f43f5e':{l:'#fff1f2',d:'#e11d48',b:'#fecdd3',r:'#fda4af'},'#8b5cf6':{l:'#f5f3ff',d:'#7c3aed',b:'#ddd6fe',r:'#c4b5fd'},'#3b82f6':{l:'#eff6ff',d:'#2563eb',b:'#bfdbfe',r:'#93c5fd'},'#14b8a6':{l:'#f0fdfa',d:'#0d9488',b:'#99f6e4',r:'#5eead4'},'#22c55e':{l:'#f0fdf4',d:'#16a34a',b:'#bbf7d0',r:'#86efac'},'#f59e0b':{l:'#fffbeb',d:'#d97706',b:'#fde68a',r:'#fcd34d'},'#ec4899':{l:'#fdf2f8',d:'#db2777',b:'#fbcfe8',r:'#f9a8d4'}};
      var p=P[hex]||{l:mix(hex,0.92),d:drk(hex,0.12),b:mix(hex,0.70),r:mix(hex,0.55)};
      var root=document.documentElement;
      root.style.setProperty('--clr',hex);root.style.setProperty('--clr-light',p.l);root.style.setProperty('--clr-dark',p.d);root.style.setProperty('--clr-border',p.b);root.style.setProperty('--clr-ring',p.r);
      var el=document.createElement('style');el.id='qra-theme';
      el.textContent='.bg-orange-50,.bg-orange-100{background-color:var(--clr-light)!important}.bg-orange-400,.bg-orange-500{background-color:var(--clr)!important}.bg-orange-600{background-color:var(--clr-dark)!important}.text-orange-400,.text-orange-500,.text-orange-600{color:var(--clr)!important}.text-orange-700{color:var(--clr-dark)!important}.border-orange-100,.border-orange-200,.border-orange-300{border-color:var(--clr-border)!important}.border-orange-500{border-color:var(--clr)!important}.hover\\:bg-orange-50:hover,.hover\\:bg-orange-100:hover{background-color:var(--clr-light)!important}.hover\\:bg-orange-500:hover{background-color:var(--clr)!important}.hover\\:bg-orange-600:hover{background-color:var(--clr-dark)!important}.hover\\:text-orange-500:hover,.hover\\:text-orange-600:hover{color:var(--clr)!important}.hover\\:border-orange-200:hover,.hover\\:border-orange-300:hover{border-color:var(--clr-border)!important}.focus\\:ring-orange-300:focus{--tw-ring-color:var(--clr-ring)!important}.ring-orange-300{--tw-ring-color:var(--clr-ring)!important}.from-orange-500{--tw-gradient-from:var(--clr)!important}.to-orange-600{--tw-gradient-to:var(--clr-dark)!important}.shadow-orange-200{--tw-shadow-color:var(--clr-border)!important}';
      document.head.appendChild(el);
    })();
  </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
